version: "3.9"

services:
  kaxio:
    image: ghcr.io/your-org/kaxio:latest
    container_name: kaxio-api
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file:
      - ../.env
    environment:
      ENVIRONMENT: production
      AUTO_CREATE_TABLES: "false"
      ENABLE_API_DOCS: "false"
      LOG_JSON: "true"
      FORCE_HTTPS: "false"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://127.0.0.1:5000/health/ready"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
